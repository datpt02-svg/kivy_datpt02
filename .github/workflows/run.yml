name: Run EVS-UI on Windows

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install uv
          # Bỏ các package cần compile CUDA (pycuda, cupy) vì không có GPU
          $deps = Get-Content requirements.txt | Where-Object { $_ -notmatch "^pycuda|^cupy-cuda" }
          $deps | Set-Content requirements_ci.txt
          uv pip install --system --index-strategy unsafe-best-match -r requirements_ci.txt

      - name: Run app
        env:
          KIVY_GL_BACKEND: angle_sdl2
        run: python main.py
